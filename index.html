<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wright Consoles - Preview</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0f19;
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            background: linear-gradient(145deg, #111827, #1f2937);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid #374151;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #10b981);
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 5px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .tagline {
            font-size: 1.2rem;
            color: #10b981;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 25px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #9ca3af;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .contact-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .contact-card {
            background: #111827;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #374151;
            text-decoration: none;
            display: block;
            transition: all 0.2s ease-in-out;
        }

        .contact-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
        }

        .contact-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 4px;
            font-weight: 600;
        }

         .contact-link {
            font-size: 1.35rem;
            color: #3b82f6;
            font-weight: 700;
            white-space: nowrap;
            /* This dynamically shrinks the text on extra small screens */
            font-size: clamp(1rem, 4.5vw, 1.35rem); 
        }


        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #4b5563;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Wright Consoles</h1>
        <div class="tagline">Business Open / Webpage Coming Soon</div>
        
        <p class="subtitle">Our workshop is fully operational and taking orders while we finish up our main site.</p>

        <div class="contact-section">
            <!-- Phone Card -->
            <a href="tel:5058500221" class="contact-card">
                <div class="contact-label">Call or Text</div>
                <div class="contact-link">(505) 850-0221</div>
            </a>

            <!-- Email Card -->
            <a href="mailto:brandon@wrightconsoles.com" class="contact-card">
                <div class="contact-label">Email Support</div>
                <div class="contact-link">brandon@wrightconsoles.com</div>
            </a>
        </div>

        <footer>
            &copy; 2026 Wright Consoles. All rights reserved.
        </footer>
    </div>

</body>
</html>
